    <script>
        (function () {
            try {
                var stored = localStorage.getItem('theme');
                if (stored === 'light' || stored === 'dark') {
                    document.documentElement.dataset.theme = stored;
                }
            } catch (e) {}
        })();
    </script>

                <button type="button" data-theme="dark" aria-label="Dark theme" title="Dark"><span aria-hidden="true">☾</span></button>

    <main>
        
<section class="blog-index" aria-labelledby="blog-heading">

    <ul class="post-list">
        
        <li>
            <a class="post-link" href="../blog/starting-a-blog/">Starting a blog</a>
            <time class="post-date" datetime="2026-05-16">2026-05-16</time>
            <p class="post-blurb">A short note on why I am starting this, and what to expect.</p>

    </ul>
    
</section>

    </main>

    <script>
        (function () {
            var buttons = document.querySelectorAll('.theme-toggle button');
            var meta = document.getElementById('theme-color-meta');

            function effectiveTheme() {
                var t = document.documentElement.dataset.theme;
                if (t === 'light' || t === 'dark') return t;
                return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
            }
            function updateMeta() {
                if (!meta) return;
                meta.setAttribute('content', effectiveTheme() === 'light' ? '#f0eee6' : '#0d0d0d');
            }
            function updateButtons() {
                var current;
                try { current = localStorage.getItem('theme'); } catch (e) { current = null; }
                if (current !== 'light' && current !== 'dark') current = 'auto';
                buttons.forEach(function (b) {
                    b.setAttribute('aria-pressed', b.dataset.theme === current ? 'true' : 'false');
                });
            }
            buttons.forEach(function (b) {
                b.addEventListener('click', function () {
                    var theme = b.dataset.theme;
                    try {
                        if (theme === 'auto') {
                            localStorage.removeItem('theme');
                            delete document.documentElement.dataset.theme;
                        } else {
                            localStorage.setItem('theme', theme);
                            document.documentElement.dataset.theme = theme;
                        }
                    } catch (e) {}
                    updateButtons();
                    updateMeta();
                });
            });
            if (window.matchMedia) {
                window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', updateMeta);
            }
            updateButtons();
            updateMeta();
        })();
    </script>
</body>
