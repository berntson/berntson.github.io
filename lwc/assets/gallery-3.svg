<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Bell tower at dusk">
  <defs>
    <linearGradient id="g3sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3E4F6B" />
      <stop offset="40%" stop-color="#9C6F6A" />
      <stop offset="75%" stop-color="#E8A878" />
      <stop offset="100%" stop-color="#F0C28C" />
    </linearGradient>
  </defs>

  <rect width="400" height="300" fill="url(#g3sky)" />

  <!-- moon -->
  <circle cx="80" cy="60" r="14" fill="#F8E9C8" opacity="0.9" />
  <circle cx="84" cy="56" r="14" fill="url(#g3sky)" opacity="0.95" />

  <!-- stars -->
  <g fill="#F8E9C8" opacity="0.7">
    <circle cx="50" cy="30" r="1" />
    <circle cx="130" cy="25" r="1.2" />
    <circle cx="170" cy="50" r="0.9" />
    <circle cx="40" cy="100" r="0.9" />
    <circle cx="320" cy="30" r="1" />
  </g>

  <!-- distant horizon -->
  <path d="M0 260 Q 200 250 400 258 L 400 300 L 0 300 Z" fill="#2A2520" opacity="0.85" />

  <!-- church silhouette, centered, larger -->
  <g fill="#1F1A14" transform="translate(0,0)">
    <!-- body -->
    <rect x="150" y="180" width="100" height="85" />
    <!-- gable roof -->
    <polygon points="146,180 254,180 200,140" />
    <!-- steeple base -->
    <rect x="190" y="140" width="20" height="40" />
    <!-- steeple roof -->
    <polygon points="186,140 214,140 200,100" />
    <!-- cross -->
    <rect x="198.4" y="80" width="3.2" height="20" />
    <rect x="192" y="86" width="16" height="3.2" />
  </g>

  <!-- bell window glowing -->
  <rect x="195" y="150" width="10" height="14" fill="#F8C97A" rx="5" opacity="0.85" />

  <!-- a couple of birds -->
  <g stroke="#1F1A14" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M 280 80 q 5 -4 10 0 q 5 -4 10 0" />
    <path d="M 310 95 q 4 -3 8 0 q 4 -3 8 0" />
  </g>

  <!-- foreground field silhouette -->
  <path d="M0 275 Q 200 270 400 278 L 400 300 L 0 300 Z" fill="#100D08" />
</svg>
