<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="The church on a snowy day">
  <defs>
    <linearGradient id="g4sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9D6DE" />
      <stop offset="100%" stop-color="#E8EDEF" />
    </linearGradient>
    <linearGradient id="g4ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4F5F6" />
      <stop offset="100%" stop-color="#DDE3E5" />
    </linearGradient>
  </defs>

  <rect width="400" height="300" fill="url(#g4sky)" />

  <!-- distant tree silhouettes -->
  <g fill="#8FA0A2" opacity="0.45">
    <polygon points="30,210 40,190 50,210" />
    <polygon points="48,212 60,184 72,212" />
    <polygon points="68,213 78,196 88,213" />
    <polygon points="320,210 332,188 344,210" />
    <polygon points="342,212 352,194 362,212" />
    <polygon points="358,213 366,200 374,213" />
  </g>

  <!-- snow ground -->
  <path d="M0 215 Q 200 205 400 215 L 400 300 L 0 300 Z" fill="url(#g4ground)" />

  <!-- church -->
  <g transform="translate(120,40)">
    <!-- gable roof base -->
    <polygon points="54,160 100,128 146,160" fill="#6B5B47" />
    <!-- snow on roof slopes -->
    <polygon points="54,160 100,128 146,160" fill="#FFFFFF" opacity="0.5" />
    <polygon points="58,158 142,158 100,140" fill="#FFFFFF" opacity="0.85" />

    <!-- body -->
    <rect x="60" y="160" width="80" height="65" fill="#FAFAF6" stroke="#B8AC91" stroke-width="1.2" />
    <g stroke="#E2D7BD" stroke-width="0.5">
      <line x1="60" y1="174" x2="140" y2="174" />
      <line x1="60" y1="186" x2="140" y2="186" />
      <line x1="60" y1="198" x2="140" y2="198" />
      <line x1="60" y1="210" x2="140" y2="210" />
    </g>
    <!-- foundation (mostly hidden by snow drift) -->
    <rect x="58" y="225" width="84" height="6" fill="#7A5448" />

    <!-- tower -->
    <rect x="92" y="92" width="16" height="68" fill="#FAFAF6" stroke="#B8AC91" stroke-width="1" />
    <!-- louvers -->
    <rect x="94" y="98" width="12" height="14" fill="#2A2520" />
    <g stroke="#85735B" stroke-width="0.5">
      <line x1="95" y1="102" x2="105" y2="102" />
      <line x1="95" y1="106" x2="105" y2="106" />
    </g>
    <!-- cap (with snow) -->
    <rect x="89" y="90" width="22" height="3" fill="#6B5B47" />
    <rect x="87" y="87" width="26" height="3" fill="#FFFFFF" opacity="0.85" />
    <!-- cross with snow cap -->
    <line x1="100" y1="80" x2="100" y2="90" stroke="#2A2520" stroke-width="1.6" stroke-linecap="round" />
    <line x1="96" y1="84" x2="104" y2="84" stroke="#2A2520" stroke-width="1.6" stroke-linecap="round" />
    <!-- tower window -->
    <rect x="95" y="118" width="10" height="10" fill="#F4C97A" stroke="#A68352" stroke-width="0.5" />

    <!-- side windows: warm glow -->
    <rect x="68" y="178" width="12" height="32" fill="#F4C97A" stroke="#A68352" stroke-width="0.7" />
    <line x1="74" y1="178" x2="74" y2="210" stroke="#A68352" stroke-width="0.4" />
    <line x1="68" y1="194" x2="80" y2="194" stroke="#A68352" stroke-width="0.4" />
    <rect x="120" y="178" width="12" height="32" fill="#F4C97A" stroke="#A68352" stroke-width="0.7" />
    <line x1="126" y1="178" x2="126" y2="210" stroke="#A68352" stroke-width="0.4" />
    <line x1="120" y1="194" x2="132" y2="194" stroke="#A68352" stroke-width="0.4" />

    <!-- doors -->
    <rect x="93" y="195" width="7" height="30" fill="#5C4A3A" />
    <rect x="100" y="195" width="7" height="30" fill="#5C4A3A" />

    <!-- snow drift at base -->
    <path d="M40 222 Q 100 213 160 222 L 160 240 L 40 240 Z" fill="#FFFFFF" opacity="0.95" />

    <!-- shrubs poking through snow -->
    <ellipse cx="56" cy="222" rx="3" ry="7" fill="#3F5A38" opacity="0.85" />
    <ellipse cx="144" cy="222" rx="3" ry="7" fill="#3F5A38" opacity="0.85" />
  </g>

  <!-- falling snowflakes -->
  <g fill="#FFFFFF">
    <circle cx="40" cy="50" r="1.5" />
    <circle cx="95" cy="35" r="1.2" />
    <circle cx="155" cy="80" r="1.5" />
    <circle cx="210" cy="40" r="1.3" />
    <circle cx="260" cy="65" r="1.6" />
    <circle cx="310" cy="42" r="1.2" />
    <circle cx="350" cy="78" r="1.4" />
    <circle cx="70" cy="110" r="1.3" />
    <circle cx="200" cy="120" r="1.5" />
    <circle cx="320" cy="130" r="1.2" />
    <circle cx="20" cy="160" r="1.4" />
    <circle cx="370" cy="170" r="1.3" />
    <circle cx="50" cy="200" r="1.5" />
    <circle cx="350" cy="200" r="1.4" />
  </g>
</svg>
